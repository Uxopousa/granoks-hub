<!DOCTYPE html><html lang=es><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>POS - Granoks</title><link rel=stylesheet href=/css/styles.css><link rel=stylesheet href=/css/nav.css><link rel=stylesheet href=/css/pos.css><script src=https://cdn.socket.io/4.7.5/socket.io.min.js></script><script defer src=/js/components/table.js></script><script defer src=/js/components/toast.js></script><script defer src=/js/nav.js></script><script defer src=/js/pedidos.js></script></head><body class=pos-page>
<div class=page>
<section class="pos-card client-card">
  <label class=client-label>Cliente</label>
  <div class=client-row>
    <input id=uInput placeholder="Nombre del cliente" value=cliente1>
    <button id=uBtn class=client-btn>Buscar</button>
    <span id=puntosDisplay></span>
  </div>
</section>
<div class=pos-main>
<section class=pos-card>
<h2>Crear pedido</h2>
<form id=pf><input name=producto placeholder=Producto required><input name=total type=number step=0.01 placeholder=Total required><button>Crear pedido</button></form>
</section>
<section class=pos-card>
<h2>Promos disponibles</h2><p class=muted>Selecciona un cliente arriba y canjea una promo con sus puntos.</p><div id=promos class=promos>Cargando...</div>
</section>
</div>
<section class="pos-card pos-history"><h2>Ultimos pedidos</h2><div id=tb>Cargando...</div></section>
</div>
</body></html>
