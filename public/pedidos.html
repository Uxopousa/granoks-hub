<!DOCTYPE html><html lang=es><head><meta charset=UTF-8><title>POS - Granoks</title><link rel=stylesheet href=/css/styles.css><script src=https://cdn.socket.io/4.7.5/socket.io.min.js></script><script defer src=/js/pedidos.js></script></head><body class=pos-page>
<h1>Punto de venta</h1>
<div class="row pos-toolbar"><a href=/index.html>Dashboard</a><span>|</span><label>Usuario:<input id=uInput value=cliente1 size=12></label><button id=uBtn>Actualizar puntos</button><strong id=puntos></strong></div>
<div class=pos-main>
<section class=pos-card>
<h2>Crear pedido</h2>
<form id=pf><input name=producto placeholder=Producto required><input name=total type=number step=0.01 placeholder=Total required><input name=username placeholder=Usuario required><button>Crear pedido</button></form>
</section>
<section class=pos-card>
<h2>Promos disponibles</h2><p class=muted>Selecciona un usuario y canjea una promo con sus puntos.</p><div id=promos class=promos>Cargando...</div>
</section>
</div>
<section class="pos-card pos-history"><h2>Ultimos pedidos</h2><table><thead><tr><th>ID</th><th>Producto</th><th>Total</th><th>Usuario</th><th>Fecha</th></tr></thead><tbody id=tb></tbody></table></section>
</body></html>
